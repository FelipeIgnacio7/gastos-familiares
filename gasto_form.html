<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nuevo Gasto</title>
<style>
:root{
  --bg:#0C0D0F;--surf:#141518;--card:#1A1C20;--card2:#202328;
  --bdr:#272B35;--bdr2:#3A3D48;--text:#E8EAF0;--muted:#5A5F6E;--muted2:#888ea0;
  --F:#F5A623;--G:#4ADE80;--R:#F87171;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Syne',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;padding:16px;padding-bottom:32px}
h1{font-size:18px;font-weight:800;margin-bottom:18px;text-align:center;letter-spacing:-.5px}
h1 em{color:var(--F);font-style:normal}

.section{margin-bottom:20px}
.label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;margin-bottom:8px}

.monto-box{background:var(--card);border:1px solid var(--bdr);border-radius:16px;
  padding:20px;text-align:center;margin-bottom:20px}
.monto-input{background:none;border:none;color:var(--text);font-size:42px;font-weight:800;
  width:100%;text-align:center;font-family:'DM Mono',monospace;outline:none}
.monto-input::placeholder{color:var(--muted)}

.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{flex:1 1 auto;min-width:80px;background:var(--card);border:1px solid var(--bdr);
  border-radius:12px;padding:14px 10px;text-align:center;font-size:14px;font-weight:700;
  color:var(--muted2);cursor:pointer;transition:.12s;user-select:none}
.chip.on{background:var(--F);color:#000;border-color:var(--F)}
.chip:active{transform:scale(.96)}

.cuotas-row{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--bdr);border-radius:12px;padding:10px 16px}
.cuotas-row .label{margin:0;flex:1}
.stepper{display:flex;align-items:center;gap:14px}
.step-btn{width:34px;height:34px;border-radius:9px;background:var(--card2);
  border:1px solid var(--bdr2);color:var(--text);font-size:18px;font-weight:700;cursor:pointer}
.step-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;min-width:20px;text-align:center}

.text-input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  padding:14px 16px;color:var(--text);font-size:15px;outline:none}
.text-input:focus{border-color:var(--bdr2)}
.text-input::placeholder{color:var(--muted)}

.submit-btn{margin-top:8px;background:var(--F);color:#000;border:none;border-radius:14px;
  padding:18px;font-size:16px;font-weight:800;cursor:pointer;transition:.15s}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.5}

.toast{position:fixed;bottom:24px;left:16px;right:16px;background:var(--card2);
  border:1px solid var(--bdr2);border-radius:12px;padding:14px 18px;text-align:center;
  font-size:14px;font-weight:700;opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--G);color:var(--G)}
.toast.err{border-color:var(--R);color:var(--R)}
</style>
</head>
<body>

<h1>Nuevo <em>gasto</em></h1>

<div class="monto-box">
  <input type="number" inputmode="numeric" class="monto-input" id="monto" placeholder="$0" autofocus>
</div>

<div class="section">
  <div class="label">Tienda</div>
  <input type="text" class="text-input" id="tienda" placeholder="Ej: Jumbo, Uber, Falabella...">
</div>

<div class="section">
  <div class="label">Tarjeta</div>
  <div class="chips" id="chips-tarjeta">
    <div class="chip" data-v="Banco de Chile">Banco de Chile</div>
    <div class="chip" data-v="Santander">Santander</div>
    <div class="chip" data-v="Scotiabank">Scotiabank</div>
    <div class="chip" data-v="Ripley">Ripley</div>
    <div class="chip" data-v="CMR Falabella">CMR Falabella</div>
    <div class="chip" data-v="Scot. Cencosud">Scotiabank Cencosud</div>
    <div class="chip" data-v="Débito">Débito</div>
    <div class="chip" data-v="Efectivo">Efectivo</div>
  </div>
</div>

<div class="section">
  <div class="label">Persona</div>
  <div class="chips" id="chips-persona">
    <div class="chip" data-v="Felipe">Felipe</div>
    <div class="chip" data-v="Francisca">Francisca</div>
    <div class="chip" data-v="Común">Común</div>
  </div>
</div>

<div class="section">
  <div class="cuotas-row">
    <div class="label" style="margin:0">Cuotas</div>
    <div class="stepper">
      <button class="step-btn" id="cuotas-menos">−</button>
      <div class="step-val" id="cuotas-val">1</div>
      <button class="step-btn" id="cuotas-mas">+</button>
    </div>
  </div>
</div>

<button class="submit-btn" id="submit">Guardar gasto</button>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwb2jFD3gMwrPtyUG2kWRXVFL0mp0PgUdrlYHU8VBriXtjx-5pCF9EYI5NDe0Bluj1E9w/exec';

let tarjeta = null, persona = null, cuotas = 1;

document.querySelectorAll('#chips-tarjeta .chip').forEach(function(c){
  c.addEventListener('click', function(){
    document.querySelectorAll('#chips-tarjeta .chip').forEach(function(x){ x.classList.remove('on'); });
    c.classList.add('on');
    tarjeta = c.dataset.v;
  });
});

document.querySelectorAll('#chips-persona .chip').forEach(function(c){
  c.addEventListener('click', function(){
    document.querySelectorAll('#chips-persona .chip').forEach(function(x){ x.classList.remove('on'); });
    c.classList.add('on');
    persona = c.dataset.v;
  });
});

var cuotasVal = document.getElementById('cuotas-val');
document.getElementById('cuotas-mas').addEventListener('click', function(){
  cuotas = Math.min(cuotas+1, 48);
  cuotasVal.textContent = cuotas;
});
document.getElementById('cuotas-menos').addEventListener('click', function(){
  cuotas = Math.max(cuotas-1, 1);
  cuotasVal.textContent = cuotas;
});

function showToast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(function(){ t.className = 'toast'; }, 2200);
}

function resetForm(){
  document.getElementById('monto').value = '';
  document.getElementById('tienda').value = '';
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('on'); });
  tarjeta = null; persona = null; cuotas = 1;
  cuotasVal.textContent = '1';
  document.getElementById('monto').focus();
}

document.getElementById('submit').addEventListener('click', function(){
  var monto = document.getElementById('monto').value;
  var tienda = document.getElementById('tienda').value.trim();

  if(!monto || Number(monto) <= 0){ showToast('Falta el monto', 'err'); return; }
  if(!tienda){ showToast('Falta la tienda', 'err'); return; }
  if(!tarjeta){ showToast('Elige una tarjeta', 'err'); return; }
  if(!persona){ showToast('Elige una persona', 'err'); return; }

  var btn = document.getElementById('submit');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  var payload = {
    fecha: new Date().toISOString().slice(0,10),
    monto: Number(monto),
    tienda: tienda,
    tarjeta: tarjeta,
    persona: persona,
    cuotas: cuotas
  };

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(function(){
    showToast('Gasto guardado ✓', 'ok');
    resetForm();
  }).catch(function(){
    showToast('Error al guardar', 'err');
  }).finally(function(){
    btn.disabled = false;
    btn.textContent = 'Guardar gasto';
  });
});
</script>
</body>
</html>
